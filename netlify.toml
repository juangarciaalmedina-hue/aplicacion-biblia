[build]
  command = "python -m pip install --upgrade pip && pip install -r requirements.txt && flet publish main.py --distpath dist"
  publish = "build/flutter/web"
  functions = "netlify/functions"

[build.environment]
  PYTHON_VERSION = "3.12"
  NODE_VERSION = "20"

[[redirects]]
  from = "/api/health"
  to = "/.netlify/functions/health"
  status = 200

[[redirects]]
  from = "/api/openrouter"
  to = "/.netlify/functions/openrouter-proxy"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
